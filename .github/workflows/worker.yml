name: signal-worker

# Gated to the active trading window: every 12 min during 07:00–20:59 UTC.
# - PAXG's COMBO_E filter skips 00:00–07:00 UTC (Asian session is muted)
# - NYSE-hours symbols (SPY/GLD/DIA) only have fresh data 13:30–20:00 UTC
# Outside this window the engine zeros every signal anyway, so ticking is
# wasted free-tier minutes. This cuts ~80% vs the prior */5 24/7 schedule
# and keeps us inside the 2,000 min/month GitHub free-tier cap.
on:
  schedule:
    - cron: "*/5 7-20 * * *"
  workflow_dispatch: {}     # also lets you trigger it manually from the Actions tab

permissions:
  contents: write           # needed so the job can push state.json back

concurrency:
  group: signal-worker
  cancel-in-progress: false

jobs:
  run-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run worker (one snapshot + notify on new signals)
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          NEWSAPI_KEY:         ${{ secrets.NEWSAPI_KEY }}
        run: python -m worker --once

      - name: Commit refreshed snapshot
        run: |
          git config user.name  "signal-worker-bot"
          git config user.email "actions@users.noreply.github.com"
          # Force-add files even though data/ is in .gitignore — these are
          # the only files the dashboard / subscribers need from cron.
          git add -f data/state.json data/last_notified.json \
                     data/signals.rss data/signals_rss_items.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no snapshot change to commit"
          else
            git commit -m "chore(snapshot): worker update $(date -u +%FT%TZ)"
            # Push with retry — with */5 cadence two workers can race on push.
            # Pull-rebase + retry up to 5 times handles the race cleanly.
            n=0
            until [ $n -ge 5 ]; do
              git pull --rebase origin main || true
              if git push; then
                echo "push succeeded on attempt $((n+1))"
                exit 0
              fi
              n=$((n+1))
              echo "push attempt $n failed, retrying in 5s..."
              sleep 5
            done
            echo "push failed after 5 attempts"
            exit 1
          fi
